<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Интерактивный диктант</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { background: #f7faff; font-family: 'Segoe UI',sans-serif; color:#232056; margin:0;}
    #main-page { display: flex; flex-wrap: wrap; gap: 24px; margin:16px 0 32px 0; justify-content:center;}
    .task-card {
      background: #fafaff;
      border-radius: 14px;
      box-shadow: 0 1px 8px #d9dbe7;
      padding: 18px;
      text-align: center;
      width: 144px;
      min-height: 130px;
      cursor: pointer;
      position: relative;
      font-size: 17px;
      transition: opacity 0.4s;
      display: flex; flex-direction: column; justify-content:center; align-items:center;
      min-height:150px;
    }
    .task-card[disabled] { pointer-events: none; opacity: 0.5; }
    .success-tag {
      position: absolute;
      top: 8px;
      left: 5px;
      background: #e0ffd7ee;
      color: #25702c;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 11px;
      z-index: 10;
      font-size: 16px;
      box-shadow: 0 1px 4px #c1e2c1;
    }
    #task-modal {
      position: fixed; left:0; top:0; right:0; bottom:0; 
      z-index: 999; background:rgba(20, 25, 42, 0.43);
      display: none; align-items: center; justify-content: center;
    }
    #task-modal>div {
      background: #fff;
      border-radius: 14px;
      min-width: 330px;
      min-height: 180px;
      padding: 38px 30px 24px 30px;
      position: relative;
      text-align: center;
      box-shadow: 0 2px 24px #b8aaff54;
    }
    .letters-box { min-height: 36px; margin: 16px 0 22px 0;}
    .draggable-letter {
      display: inline-block;
      background: #e3e6f8;
      color: #272659;
      font-size: 23px;
      padding: 7px 14px;
      margin: 4px;
      border-radius: 8px;
      cursor: grab;
      font-weight: bold;
      box-shadow: 0 0 3px #acaaff60;
      user-select: none;
      transition: background .23s;
    }
    .draggable-letter.drag-over {
      background: #ffea80;
      border: 2px solid #e0ad00;
    }
    .letters-box.touch-mode .draggable-letter {cursor:pointer;}
    #progress-bar {margin: 22px 0 18px 0; text-align:center;}
    #progress-feedback {margin-left: 15px; color:#14914c; font-weight:500;}
    @media(max-width:600px){
      #task-modal>div { min-width:0; width:90vw;}
      .task-card {width:45vw; min-width:116px;}
    }
  </style>
</head>
<body>
<div id="main-page"></div>
<div id="task-modal"></div>
<div id="progress-bar">
  <label>Отметь свой прогресс:
    <input type="range" id="progress-range" min="0" max="3" value="0">
  </label>
  <span id="progress-feedback"></span>
</div>
<script>
// ----- Настраиваемые задания -----
const dictationTasks = [
  {
    id: 1,
    type: 'image',
    image: 'https://www.kindpng.com/picc/m/21-214439_cat-png-image-cartoon-cat-png-transparent-png.png',
    definition: '',
    answer: 'кот',
    feedback: 'Верно! 🐾',
    mode: 'letters'
  },
  {
    id: 2,
    type: 'definition',
    image: '',
    definition: 'Маленькое пушистое домашнее животное, мурлычет.',
    answer: 'кот',
    feedback: 'Прекрасно!',
    mode: 'input'
  },
  {
    id: 3,
    type: 'image',
    image: 'https://pngimg.com/uploads/dog/dog_PNG50348.png',
    definition: '',
    answer: 'пёс',
    feedback: '👏 Готово!',
    mode: 'letters'
  }
];
// --------------------------------
let currentTask = null;
let doneTasks = {};
const progressRange = document.getElementById('progress-range');
progressRange.max = dictationTasks.length;

function renderMainPage() {
  const main = document.getElementById('main-page');
  main.innerHTML = '';
  dictationTasks.forEach(task => {
    const card = document.createElement('div');
    card.className = 'task-card';
    // Затемнение и плашка успеха
    if (doneTasks[task.id]) {
      card.setAttribute('disabled', '');
      const success = document.createElement('div');
      success.className = 'success-tag';
      if (task.feedback.endsWith('.gif') || task.feedback.endsWith('.png')) {
        success.innerHTML = `<img src="${task.feedback}" alt="success" style="width:38px;">`;
      } else {
        success.innerHTML = `<span>${task.feedback}</span>`;
      }
      card.appendChild(success);
    }
    // Контент карточки
    if (task.type === 'image') {
      card.innerHTML += `<div><img src="${task.image}" alt="task" style="width:70px;"></div>`;
    } else {
      card.innerHTML += `<div style="margin-top:18px;">${task.definition}</div>`;
    }
    card.onclick = () => { if (!doneTasks[task.id]) openTask(task); };
    main.appendChild(card);
  });
}

function openTask(task) {
  currentTask = task;
  const modal = document.getElementById('task-modal');
  modal.style.display = 'flex';
  let taskModal = document.createElement('div');
  if (task.mode === 'letters') {
    let shuffled = shuffleLetters(task.answer);
    taskModal.innerHTML = `
      <div>Собери слово:</div>
      <div class="letters-box" id="letters-box">${
        shuffled.map((letter, i) =>
          `<span class="draggable-letter" draggable="true" data-index="${i}">${letter}</span>`
        ).join('')
      }</div>
      <button onclick="checkLettersAnswer()" style="margin-bottom:16px;">Проверить</button>
      <div id="feedback"></div>
      <button onclick="closeTask()" style="margin-top:12px;">Назад</button>
    `;
    modal.innerHTML = '';
    modal.appendChild(taskModal);
    enableDragAndDropTouch();
  } else {
    // Режим ввода текста
    taskModal.innerHTML = `
      <div>Введи слово:</div>
      <input type="text" id="text-input" autocomplete="off" style="font-size:22px;padding:4px;text-align:center;">
      <button onclick="checkTextInput()" style="margin-left:10px;">Проверить</button>
      <div id="feedback"></div>
      <button onclick="closeTask()" style="display:block;margin:18px auto 0;">Назад</button>
    `;
    modal.innerHTML = '';
    modal.appendChild(taskModal);
    setTimeout(()=>document.getElementById('text-input').focus(), 100);
  }
}
// --- Drag & Drop и Touch для букв ---
function enableDragAndDropTouch() {
  let dragged = null;
  const box = document.getElementById('letters-box');
  const letters = box.querySelectorAll('.draggable-letter');

  // Для Desktop
  letters.forEach(l => {
    l.addEventListener('dragstart', function(e){
      dragged = this;
      setTimeout(()=>this.style.opacity = "0.25", 0);
    });
    l.addEventListener('dragend', function(e){
      this.style.opacity = "1";
      dragged = null;
      letters.forEach(el => el.classList.remove('drag-over'));
    });
    l.addEventListener('dragover', function(e){ e.preventDefault(); });
    l.addEventListener('dragenter', function(e){ this.classList.add('drag-over'); });
    l.addEventListener('dragleave', function(e){ this.classList.remove('drag-over'); });
    l.addEventListener('drop', function(e) {
      e.preventDefault();
      if (!dragged || dragged === this) return;
      const all = Array.from(box.children);
      const draggedIdx = all.indexOf(dragged);
      const dropIdx = all.indexOf(this);
      if (draggedIdx < dropIdx) {
        box.insertBefore(dragged, this.nextSibling);
      } else {
        box.insertBefore(dragged, this);
      }
      letters.forEach(el => el.classList.remove('drag-over'));
    });
  });
  // Мобильный touch: тапаем две буквы по очереди — меняем местами
  let firstTap = null;
  box.classList.remove('touch-mode');
  if ('ontouchstart' in window) {
    box.classList.add('touch-mode');
    letters.forEach(l => l.ontouchend = (e)=>{
      e.preventDefault();
      if (firstTap===null) {
        firstTap = l;
        l.style.background = "#ffe683";
      } else if (firstTap!==l) {
        swapElems(firstTap,l);
        firstTap.style.background = "";
        firstTap = null;
      } else {
        firstTap.style.background = "";
        firstTap = null;
      }
    });
    document.body.ontouchstart = (e)=>{
      if(firstTap && !e.target.classList.contains('draggable-letter')) {
        firstTap.style.background = ""; firstTap=null;
      }
    }
  }
}
function swapElems(a,b){
  var ap = a.parentNode, asib = a.nextSibling;
  if (asib === b) { ap.insertBefore(b,a); }
  else { ap.insertBefore(a,b); }
}
function shuffleLetters(word) {
  let arr = word.split('');
  if(arr.length<=3) return arr;
  let shuffled;
  do {
    shuffled = arr.slice().sort(()=>Math.random()-0.5);
  } while(shuffled.join('')===word);
  return shuffled;
}
function checkLettersAnswer() {
  const letters = Array.from(document.querySelectorAll('.draggable-letter')).map(el=>el.innerText).join('');
  if (letters === currentTask.answer) showPositiveFeedback();
}
function checkTextInput() {
  const input = document.getElementById('text-input').value.trim();
  if(input.toLowerCase() === currentTask.answer.toLowerCase()) showPositiveFeedback();
}
function showPositiveFeedback() {
  const area = document.getElementById('feedback');
  const isGif = (currentTask.feedback.endsWith('.gif') || currentTask.feedback.endsWith('.png'));
  area.innerHTML = isGif ?
    `<img src="${currentTask.feedback}" alt="success" style="width:85px;">` :
    `<span style="font-size:22px;color:#208a4e;font-weight:bold;">${currentTask.feedback}</span><br>`;
  area.innerHTML += `<button onclick="finishTask()" style="margin:16px auto 0;">На главную</button>`;
}
function closeTask() {
  document.getElementById('task-modal').style.display = 'none';
  renderMainPage();
}
function finishTask() {
  doneTasks[currentTask.id] = true;
  closeTask();
  updateProgressRange();
}
const RANGE_FEEDBACKS = [
  'Ещё всё впереди!',
  'Хороший старт!',
  'Ты почти у цели!',
  'Великолепно! Всё получилось!'
];
function updateProgressRange() {
  const range = document.getElementById('progress-range');
  const feedback = document.getElementById('progress-feedback');
  range.value = Object.keys(doneTasks).length;
  let idx = Math.min(range.value, RANGE_FEEDBACKS.length-1);
  feedback.textContent = RANGE_FEEDBACKS[idx];
}
document.getElementById('progress-range').addEventListener('input', updateProgressRange);
renderMainPage();
updateProgressRange();
</script>
</body>
</html>
